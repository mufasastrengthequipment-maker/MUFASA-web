<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MUFASA PLAYER</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#080c18;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Nunito',sans-serif;padding:16px}
  .app{width:100%;max-width:420px;background:linear-gradient(160deg,#0f0a25 0%,#0a1628 50%,#080f1e 100%);border-radius:20px;overflow:hidden;border:1px solid rgba(245,166,35,0.15);box-shadow:0 30px 80px rgba(0,0,0,0.7)}
  .header{padding:14px 18px;background:rgba(0,0,0,0.3);border-bottom:0.5px solid rgba(245,166,35,0.15);display:flex;align-items:center;gap:12px}
  .logo{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#f5a623,#e85d04);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',cursive;font-size:22px;color:#fff;flex-shrink:0;box-shadow:0 4px 16px rgba(245,166,35,0.4)}
  .brand-name{font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:3px;color:#f5a623;line-height:1}
  .brand-sub{font-size:9px;letter-spacing:4px;color:rgba(245,166,35,0.45)}
  .count-badge{margin-left:auto;background:rgba(245,166,35,0.12);color:#f5a623;border:0.5px solid rgba(245,166,35,0.3);font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px}
  #load-screen{padding:20px 18px 24px}
  .drop-zone{border:1.5px dashed rgba(245,166,35,0.3);border-radius:14px;padding:36px 20px;text-align:center;cursor:pointer;transition:all 0.25s;background:rgba(245,166,35,0.02)}
  .drop-zone:hover,.drop-zone.drag{border-color:#f5a623;background:rgba(245,166,35,0.06)}
  .dz-icon{font-size:52px;color:rgba(245,166,35,0.4);display:block;margin-bottom:14px}
  .drop-zone h2{font-size:18px;font-weight:800;color:#fff;margin-bottom:8px}
  .drop-zone p{font-size:13px;color:rgba(255,255,255,0.35);line-height:1.7}
  .dz-hint{margin-top:16px;display:inline-flex;align-items:center;gap:6px;background:rgba(245,166,35,0.08);border:0.5px solid rgba(245,166,35,0.2);border-radius:20px;padding:6px 14px;font-size:11px;color:rgba(245,166,35,0.7)}
  .formats{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:14px}
  .fmt-tag{background:rgba(255,255,255,0.04);border:0.5px solid rgba(255,255,255,0.1);border-radius:4px;padding:3px 8px;font-size:10px;color:rgba(255,255,255,0.3)}
  #player-section{display:none}
  .tabs{display:flex;background:rgba(0,0,0,0.2);border-bottom:0.5px solid rgba(255,255,255,0.06)}
  .tab-btn{flex:1;padding:9px 6px;background:transparent;border:none;border-bottom:2px solid transparent;color:rgba(255,255,255,0.35);font-size:12px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;transition:all 0.15s}
  .tab-btn.active{color:#f5a623;border-bottom-color:#f5a623}
  .toolbar{display:flex;gap:8px;padding:10px 14px;background:rgba(0,0,0,0.25);border-bottom:0.5px solid rgba(255,255,255,0.06)}
  .toolbar input{flex:1;background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.1);border-radius:8px;padding:8px 12px;color:#fff;font-size:13px;font-family:'Nunito',sans-serif;outline:none;transition:border-color 0.2s}
  .toolbar input:focus{border-color:rgba(245,166,35,0.4)}
  .toolbar input::placeholder{color:rgba(255,255,255,0.2)}
  .add-more-btn{background:transparent;border:0.5px solid rgba(245,166,35,0.4);color:#f5a623;border-radius:8px;padding:8px 12px;cursor:pointer;font-size:12px;font-weight:700;display:flex;align-items:center;gap:4px;transition:all 0.15s;white-space:nowrap;font-family:'Nunito',sans-serif}
  .add-more-btn:hover{background:rgba(245,166,35,0.1)}
  .track-list{max-height:250px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(245,166,35,0.2) transparent}
  .track-list::-webkit-scrollbar{width:3px}
  .track-list::-webkit-scrollbar-thumb{background:rgba(245,166,35,0.2);border-radius:2px}
  .track{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;border-bottom:0.5px solid rgba(255,255,255,0.04);transition:background 0.12s;position:relative}
  .track::after{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,#f5a623,#e85d04);transform:scaleY(0);transition:transform 0.15s;border-radius:0 2px 2px 0}
  .track:hover{background:rgba(255,255,255,0.04)}
  .track.active{background:rgba(245,166,35,0.08)}
  .track.active::after{transform:scaleY(1)}
  .t-num{width:22px;font-size:11px;color:rgba(255,255,255,0.2);text-align:center;flex-shrink:0}
  .t-icon{width:36px;height:36px;border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.05);font-size:15px}
  .t-icon.on{background:linear-gradient(135deg,#f5a623,#e85d04)}
  .t-info{flex:1;min-width:0}
  .t-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff}
  .t-sub{font-size:10px;color:rgba(255,255,255,0.3);margin-top:1px}
  .t-dur{font-size:11px;color:rgba(255,255,255,0.25);flex-shrink:0;min-width:38px;text-align:right}
  .t-del{background:transparent;border:none;color:rgba(255,255,255,0.15);cursor:pointer;padding:4px;border-radius:5px;font-size:14px;flex-shrink:0;transition:color 0.15s}
  .t-del:hover{color:#e85d04}
  .list-empty{padding:30px;text-align:center;color:rgba(255,255,255,0.2);font-size:13px}
  .list-empty i{font-size:32px;display:block;margin-bottom:8px}
  .np-section{background:linear-gradient(180deg,rgba(0,0,0,0.4) 0%,rgba(10,8,30,0.95) 100%);border-top:0.5px solid rgba(245,166,35,0.15);padding:16px 18px 18px}
  .np-header{display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .np-art{width:52px;height:52px;border-radius:10px;flex-shrink:0;background:linear-gradient(135deg,#2a1060,#0d3a6e);display:flex;align-items:center;justify-content:center;font-size:26px}
  .np-meta{flex:1;min-width:0}
  .np-name{font-size:15px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff}
  .np-artist{font-size:12px;color:rgba(255,255,255,0.4);margin-top:3px}
  .np-fav{background:transparent;border:none;font-size:22px;cursor:pointer;padding:4px;color:rgba(255,255,255,0.2);transition:all 0.15s;flex-shrink:0}
  .np-fav.on{color:#f5a623}
  .prog-wrap{margin-bottom:10px}
  .prog-bar{width:100%;height:5px;background:rgba(255,255,255,0.08);border-radius:3px;cursor:pointer}
  .prog-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#f5a623,#e85d04);width:0%;pointer-events:none}
  .prog-times{display:flex;justify-content:space-between;font-size:10px;color:rgba(255,255,255,0.25);margin-top:5px}
  .controls{display:flex;align-items:center;justify-content:center;gap:18px;margin:8px 0}
  .ctrl-btn{background:transparent;border:none;color:rgba(255,255,255,0.4);font-size:22px;cursor:pointer;padding:5px;transition:all 0.15s}
  .ctrl-btn:hover{color:#f5a623;transform:scale(1.1)}
  .ctrl-btn.on{color:#f5a623}
  .play-btn{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#f5a623,#e85d04);border:none;color:#fff;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform 0.1s;box-shadow:0 6px 24px rgba(245,166,35,0.4)}
  .play-btn:active{transform:scale(0.93)}
  .vol-row{display:flex;align-items:center;gap:8px;margin-top:8px}
  .vol-row i{font-size:16px;color:rgba(255,255,255,0.25);flex-shrink:0}
  .vol-row input[type=range]{flex:1;-webkit-appearance:none;appearance:none;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;outline:none;cursor:pointer}
  .vol-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#f5a623;cursor:pointer}
  .vol-row input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:#f5a623;cursor:pointer;border:none}
  .toast{display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#e85d04;color:#fff;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:700;z-index:999;white-space:nowrap}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">M</div>
    <div>
      <div class="brand-name">MUFASA PLAYER</div>
      <div class="brand-sub">STABLE EDITION</div>
    </div>
    <div class="count-badge" id="count-badge">0 songs</div>
  </div>

  <div id="load-screen">
    <div class="drop-zone" id="drop-zone" onclick="document.getElementById('fp').click()">
      <i class="ti ti-folder-open dz-icon"></i>
      <h2>Load Your Music</h2>
      <p>Tap to select MP3, WAV, OGG or M4A files<br>from your device. Select multiple at once.</p>
      <div class="dz-hint"><i class="ti ti-info-circle" style="font-size:12px"></i> Hold to select all files</div>
      <div class="formats">
        <span class="fmt-tag">MP3</span><span class="fmt-tag">WAV</span>
        <span class="fmt-tag">OGG</span><span class="fmt-tag">M4A</span>
        <span class="fmt-tag">FLAC</span><span class="fmt-tag">AAC</span>
      </div>
    </div>
  </div>

  <div id="player-section">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('all',this)">All Songs</button>
      <button class="tab-btn" onclick="switchTab('fav',this)">Favourites</button>
      <button class="tab-btn" onclick="switchTab('recent',this)">Recent</button>
    </div>
    <div class="toolbar">
      <input type="text" id="search-input" placeholder="Search songs..." oninput="debounceRender()">
      <button class="add-more-btn" onclick="document.getElementById('fp').click()">
        <i class="ti ti-plus"></i> Add More
      </button>
    </div>
    <div class="track-list" id="track-list"></div>
    <div class="np-section">
      <div class="np-header">
        <div class="np-art">&#129409;</div>
        <div class="np-meta">
          <div class="np-name" id="np-name">No track selected</div>
          <div class="np-artist" id="np-artist">Tap a song to start</div>
        </div>
        <button class="np-fav" id="fav-btn" onclick="toggleFav()">
          <i class="ti ti-heart" id="heart-icon"></i>
        </button>
      </div>
      <div class="prog-wrap">
        <div class="prog-bar" onclick="seekTo(event)">
          <div class="prog-fill" id="prog-fill"></div>
        </div>
        <div class="prog-times">
          <span id="t-cur">0:00</span><span id="t-tot">0:00</span>
        </div>
      </div>
      <div class="controls">
        <button class="ctrl-btn" id="shuf-btn" onclick="toggleShuffle()"><i class="ti ti-arrows-shuffle"></i></button>
        <button class="ctrl-btn" onclick="prevTrack()"><i class="ti ti-player-skip-back"></i></button>
        <button class="play-btn" onclick="togglePlay()"><i class="ti ti-player-play" id="play-icon"></i></button>
        <button class="ctrl-btn" onclick="nextTrack()"><i class="ti ti-player-skip-forward"></i></button>
        <button class="ctrl-btn" id="rep-btn" onclick="toggleRepeat()"><i class="ti ti-repeat"></i></button>
      </div>
      <div class="vol-row">
        <i class="ti ti-volume"></i>
        <input type="range" min="0" max="1" step="0.01" value="0.8" oninput="audio.volume=+this.value">
        <i class="ti ti-volume-3"></i>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="fp" accept="audio/*" multiple style="display:none" onchange="loadFiles(event)">

<script>
'use strict';
var tracks=[],cur=-1,playing=false,shuf=false,rep=false,tab='all';
var durCache={},durQueue=[],durBusy=0,MAX_DUR=3;
var searchTimer=null;

var audio=new Audio();
audio.preload='none';
audio.volume=0.8;

/* ---- utils ---- */
function fmt(s){
  if(!isFinite(s)||isNaN(s)||s<0)return'--:--';
  s=Math.floor(s);return Math.floor(s/60)+':'+(s%60<10?'0':'')+(s%60);
}
function clean(n){return n.replace(/\.[^.]+$/,'').replace(/[_-]+/g,' ').trim();}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function toast(m){
  var el=document.getElementById('toast');
  el.textContent=m;el.style.display='block';
  clearTimeout(toast._t);toast._t=setTimeout(function(){el.style.display='none';},3000);
}
function badge(){document.getElementById('count-badge').textContent=tracks.length+' song'+(tracks.length!==1?'s':'');}

/* ---- file loading ---- */
/* Android content:// URIs often have empty/wrong MIME type.
   Accept all selected files; Audio engine rejects unplayable ones. */
function loadFiles(e){
  var files=[].slice.call(e.target.files);
  if(!files.length)return;
  var added=0;
  files.forEach(function(f){
    var extM=f.name.match(/\.([^.]+)$/);
    var badExt=/^(jpg|jpeg|png|gif|webp|mp4|mkv|avi|pdf|doc|docx|xls|zip|apk|txt|csv)$/i;
    if(extM&&extM[1]&&badExt.test(extM[1]))return;
    try{
      tracks.push({name:clean(f.name),url:URL.createObjectURL(f),fav:false,added:Date.now()});
      added++;
    }catch(err){}
  });
  if(!added){toast('Could not load files - try selecting again');return;}
  document.getElementById('load-screen').style.display='none';
  document.getElementById('player-section').style.display='block';
  badge();renderList();
  if(cur<0)playTrack(0);
  e.target.value='';
}

/* ---- throttled duration reader (KEY crash fix) ---- */
function enqueueDur(i){
  if(durCache[i]!==undefined||durQueue.indexOf(i)!==-1)return;
  durQueue.push(i);pump();
}
function pump(){
  while(durBusy<MAX_DUR&&durQueue.length){
    var i=durQueue.shift();
    if(durCache[i]!==undefined)continue;
    if(!tracks[i]){continue;}
    durBusy++;
    (function(idx){
      var a=new Audio(),done=false,t=null;
      function finish(d){
        if(done)return;done=true;
        durBusy--;
        clearTimeout(t);
        try{a.src='';a.load();}catch(e){}
        a=null;
        durCache[idx]=d||'';
        var el=document.getElementById('dur-'+idx);
        if(el&&d)el.textContent=d;
        pump();
      }
      a.preload='metadata';
      a.onloadedmetadata=function(){finish(fmt(a.duration));};
      a.onerror=function(){finish('');};
      t=setTimeout(function(){finish('');},6000);
      try{a.src=tracks[idx].url;}catch(e){finish('');}
    })(i);
  }
}

/* ---- render ---- */
function getVisible(){
  var q=document.getElementById('search-input').value.toLowerCase();
  var list=[];for(var i=0;i<tracks.length;i++)list.push(i);
  if(tab==='fav')list=list.filter(function(i){return tracks[i].fav;});
  if(tab==='recent')list=list.slice().sort(function(a,b){return tracks[b].added-tracks[a].added;}).slice(0,20);
  if(q)list=list.filter(function(i){return tracks[i].name.toLowerCase().indexOf(q)!==-1;});
  return list;
}
function renderList(){
  var el=document.getElementById('track-list');
  var idxs=getVisible();
  if(!idxs.length){el.innerHTML='<div class="list-empty"><i class="ti ti-music-off"></i>No tracks found</div>';return;}
  var h='';
  for(var v=0;v<idxs.length;v++){
    var ri=idxs[v],t=tracks[ri],act=ri===cur;
    var num=act&&playing?'<i class="ti ti-volume" style="color:#f5a623;font-size:13px"></i>':(v+1);
    h+='<div class="track'+(act?' active':'')+'" onclick="playTrack('+ri+')">'
      +'<div class="t-num">'+num+'</div>'
      +'<div class="t-icon'+(act?' on':'')+'"><i class="ti ti-music" style="color:'+(act?'#fff':'rgba(255,255,255,0.2)')+'"></i></div>'
      +'<div class="t-info"><div class="t-name">'+esc(t.name)+'</div>'
      +'<div class="t-sub">'+(t.fav?'<i class="ti ti-heart-filled" style="color:#f5a623;font-size:10px"></i> ':'')+'Audio</div></div>'
      +'<div class="t-dur" id="dur-'+ri+'">'+(durCache[ri]||'--:--')+'</div>'
      +'<button class="t-del" onclick="event.stopPropagation();del('+ri+')" title="Remove"><i class="ti ti-trash"></i></button>'
      +'</div>';
    enqueueDur(ri);
  }
  el.innerHTML=h;
}
function debounceRender(){clearTimeout(searchTimer);searchTimer=setTimeout(renderList,200);}

/* ---- playback ---- */
function playTrack(i){
  if(i<0||i>=tracks.length)return;
  cur=i;
  try{
    audio.pause();
    audio.src=tracks[i].url;
    audio.load();
    audio.play().catch(function(e){toast('Error: '+e.message);});
  }catch(e){toast('Cannot play file');return;}
  document.getElementById('np-name').textContent=tracks[i].name;
  document.getElementById('np-artist').textContent='Your Library';
  document.getElementById('heart-icon').className=tracks[i].fav?'ti ti-heart-filled':'ti ti-heart';
  document.getElementById('fav-btn').classList.toggle('on',tracks[i].fav);
  document.getElementById('prog-fill').style.width='0%';
  document.getElementById('t-cur').textContent='0:00';
  document.getElementById('t-tot').textContent='--:--';
  renderList();
}
audio.ontimeupdate=function(){
  if(!audio.duration||!isFinite(audio.duration))return;
  var p=(audio.currentTime/audio.duration)*100;
  document.getElementById('prog-fill').style.width=Math.min(p,100).toFixed(2)+'%';
  document.getElementById('t-cur').textContent=fmt(audio.currentTime);
  document.getElementById('t-tot').textContent=fmt(audio.duration);
};
audio.onplay=function(){playing=true;upPlayBtn();renderList();};
audio.onpause=function(){playing=false;upPlayBtn();renderList();};
audio.onerror=function(){
  var c=audio.error?audio.error.code:0;
  var msgs=['','Aborted','Network error','Decode error','Format not supported'];
  toast('Audio error: '+(msgs[c]||'Unknown'));
};
audio.onended=function(){
  if(rep){audio.currentTime=0;audio.play().catch(function(){});return;}
  if(shuf){playTrack(Math.floor(Math.random()*tracks.length));}
  else if(cur<tracks.length-1){playTrack(cur+1);}
  else{playing=false;upPlayBtn();}
};
function upPlayBtn(){document.getElementById('play-icon').className=playing?'ti ti-player-pause':'ti ti-player-play';}
function togglePlay(){
  if(cur<0&&tracks.length){playTrack(0);return;}
  if(cur<0)return;
  audio.paused?audio.play().catch(function(e){toast(e.message);}):audio.pause();
}
function prevTrack(){if(audio.currentTime>3){audio.currentTime=0;return;}playTrack(cur<=0?tracks.length-1:cur-1);}
function nextTrack(){shuf?playTrack(Math.floor(Math.random()*tracks.length)):playTrack((cur+1)%tracks.length);}
function toggleShuffle(){shuf=!shuf;document.getElementById('shuf-btn').classList.toggle('on',shuf);}
function toggleRepeat(){rep=!rep;document.getElementById('rep-btn').classList.toggle('on',rep);}
function toggleFav(){
  if(cur<0)return;
  tracks[cur].fav=!tracks[cur].fav;
  document.getElementById('heart-icon').className=tracks[cur].fav?'ti ti-heart-filled':'ti ti-heart';
  document.getElementById('fav-btn').classList.toggle('on',tracks[cur].fav);
  renderList();
}
function seekTo(e){
  if(!audio.duration||!isFinite(audio.duration))return;
  var r=e.currentTarget.getBoundingClientRect();
  audio.currentTime=Math.max(0,Math.min((e.clientX-r.left)/r.width,1))*audio.duration;
}
function del(i){
  try{URL.revokeObjectURL(tracks[i].url);}catch(e){}
  // rebuild durCache after removal
  var nc={};
  Object.keys(durCache).forEach(function(k){
    var ki=parseInt(k,10);
    if(ki<i)nc[ki]=durCache[ki];
    else if(ki>i)nc[ki-1]=durCache[ki];
  });
  durCache=nc;
  tracks.splice(i,1);
  if(i===cur){
    audio.pause();audio.src='';audio.load();
    cur=-1;playing=false;upPlayBtn();
    document.getElementById('np-name').textContent='No track selected';
    document.getElementById('np-artist').textContent='Tap a song to start';
    document.getElementById('prog-fill').style.width='0%';
    document.getElementById('t-cur').textContent='0:00';
    document.getElementById('t-tot').textContent='0:00';
  }else if(i<cur)cur--;
  badge();
  if(!tracks.length){
    document.getElementById('player-section').style.display='none';
    document.getElementById('load-screen').style.display='block';
  }
  renderList();
}
function switchTab(t,btn){
  tab=t;
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');renderList();
}

/* ---- drag & drop ---- */
var dz=document.getElementById('drop-zone');
dz.addEventListener('dragover',function(e){e.preventDefault();dz.classList.add('drag');});
dz.addEventListener('dragleave',function(){dz.classList.remove('drag');});
dz.addEventListener('drop',function(e){
  e.preventDefault();dz.classList.remove('drag');
  var files=[].slice.call(e.dataTransfer.files);
  if(!files.length)return;
  files.forEach(function(f){try{tracks.push({name:clean(f.name),url:URL.createObjectURL(f),fav:false,added:Date.now()});}catch(e){}});
  document.getElementById('load-screen').style.display='none';
  document.getElementById('player-section').style.display='block';
  badge();renderList();if(cur<0)playTrack(0);
});
</script>
</body>
